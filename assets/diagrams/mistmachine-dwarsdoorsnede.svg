<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Dwarsdoorsnede van een mistmachine</title>
  <desc id="desc">Technische doorsnede met tank, pomp, slang, verwarmingsblok, ventilator en uitstromende mist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f3ea"/>
      <stop offset="100%" stop-color="#e5ddd1"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5c6570"/>
      <stop offset="100%" stop-color="#2f353b"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b7c1c9"/>
      <stop offset="100%" stop-color="#77828d"/>
    </linearGradient>
    <linearGradient id="fluid" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#93d9ff"/>
      <stop offset="100%" stop-color="#3e94d1"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffbc63"/>
      <stop offset="50%" stop-color="#ff7a39"/>
      <stop offset="100%" stop-color="#cf3928"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#dbe5ef" stop-opacity="0.92"/>
      <stop offset="70%" stop-color="#eef4fa" stop-opacity="0.56"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="mistBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a2f19"/>
    </marker>
    <style>
      .label { font: 700 24px Georgia, serif; fill: #261d1b; }
      .small { font: 500 18px Georgia, serif; fill: #4e403a; }
      .callout { stroke: #7a2f19; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .outline { stroke: #1d2328; stroke-width: 6; fill: url(#shell); }
      .thin { stroke: #253038; stroke-width: 4; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="700" y="70" text-anchor="middle" class="label" style="font-size:42px;">Dwarsdoorsnede Mistmachine</text>
  <text x="700" y="108" text-anchor="middle" class="small" style="font-size:22px;">Tank, pomp, verwarming en uitstromende mist in één doorsnede</text>

  <g transform="translate(130 170)">
    <path d="M70 40 h760 a70 70 0 0 1 70 70 v390 a70 70 0 0 1 -70 70 h-760 a70 70 0 0 1 -70 -70 v-390 a70 70 0 0 1 70 -70z" class="outline"/>
    <path d="M80 60 h740 a50 50 0 0 1 50 50 v370 a50 50 0 0 1 -50 50 h-740 a50 50 0 0 1 -50 -50 v-370 a50 50 0 0 1 50 -50z" fill="#eef1f4" stroke="#d0d6dc" stroke-width="3"/>

    <rect x="55" y="575" width="790" height="30" rx="14" fill="#23282d"/>
    <circle cx="145" cy="590" r="12" fill="#cfd7de"/>
    <circle cx="745" cy="590" r="12" fill="#cfd7de"/>

    <g transform="translate(70 110)">
      <rect x="0" y="0" width="250" height="300" rx="26" fill="#dfe8ef" stroke="#5d6b76" stroke-width="6"/>
      <rect x="18" y="56" width="214" height="214" rx="18" fill="url(#fluid)" opacity="0.95"/>
      <line x1="35" y1="40" x2="215" y2="40" stroke="#62707c" stroke-width="10" stroke-linecap="round"/>
      <circle cx="125" cy="40" r="16" fill="#909aa3" stroke="#55616b" stroke-width="4"/>
      <text x="125" y="-24" text-anchor="middle" class="label">Mistvloeistof</text>
      <text x="125" y="22" text-anchor="middle" class="small">Tank</text>
      <path d="M230 220 C270 220, 305 220, 325 220" class="thin"/>
    </g>

    <g transform="translate(405 292)">
      <circle cx="0" cy="0" r="46" fill="url(#metal)" stroke="#48525a" stroke-width="6"/>
      <circle cx="0" cy="0" r="16" fill="#54606a"/>
      <rect x="-18" y="42" width="36" height="70" rx="10" fill="#626d77"/>
      <text x="0" y="-76" text-anchor="middle" class="label">Pomp</text>
    </g>

    <path d="M320 330 C360 330, 382 330, 405 330" class="thin"/>
    <path d="M451 330 C525 330, 560 330, 610 330" class="thin"/>

    <g transform="translate(610 245)">
      <rect x="0" y="0" width="180" height="160" rx="22" fill="#4f555d" stroke="#2f343a" stroke-width="6"/>
      <rect x="18" y="22" width="144" height="116" rx="14" fill="url(#heat)"/>
      <path d="M36 80 h108" stroke="#fff3d0" stroke-width="12" stroke-linecap="round" opacity="0.78"/>
      <path d="M36 52 h108" stroke="#fff3d0" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
      <path d="M36 108 h108" stroke="#fff3d0" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
      <text x="90" y="-26" text-anchor="middle" class="label">Verwarmingsblok</text>
      <text x="90" y="187" text-anchor="middle" class="small">Hier verdampt de vloeistof razendsnel</text>
    </g>

    <path d="M790 330 C840 330, 870 330, 905 330" class="thin"/>

    <g transform="translate(905 248)">
      <rect x="0" y="28" width="92" height="104" rx="14" fill="#98a3ac" stroke="#47515a" stroke-width="6"/>
      <circle cx="46" cy="80" r="28" fill="#ced5db" stroke="#6c7881" stroke-width="5"/>
      <path d="M46 54 L56 80 L46 106 L36 80 Z" fill="#7e8b95"/>
      <path d="M20 80 h52" stroke="#68747d" stroke-width="4"/>
      <path d="M101 80 C140 75, 174 70, 214 72" stroke="#c2ccd3" stroke-width="12" stroke-linecap="round"/>
      <text x="46" y="-12" text-anchor="middle" class="label">Uitlaat</text>
    </g>

    <g transform="translate(1080 248)">
      <ellipse cx="80" cy="82" rx="100" ry="42" fill="url(#mist)" filter="url(#mistBlur)"/>
      <ellipse cx="142" cy="68" rx="86" ry="34" fill="url(#mist)" filter="url(#mistBlur)"/>
      <ellipse cx="165" cy="102" rx="110" ry="46" fill="url(#mist)" filter="url(#mistBlur)"/>
      <text x="90" y="-10" text-anchor="middle" class="label">Mistwolk</text>
    </g>

    <path d="M325 330 C352 330, 376 330, 405 330" stroke="#2ca6ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M451 330 C520 330, 565 330, 610 330" stroke="#2ca6ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M790 330 C838 330, 870 330, 905 330" stroke="#fff1c1" stroke-width="8" stroke-linecap="round"/>

    <path d="M165 110 C165 60, 165 18, 165 -10" class="callout"/>
    <text x="180" y="-30" class="small">1. Tank met mistvloeistof</text>

    <path d="M405 216 C405 170, 405 132, 405 92" class="callout"/>
    <text x="425" y="80" class="small">2. Pomp duwt vloeistof naar voren</text>

    <path d="M705 215 C720 155, 760 116, 835 86" class="callout"/>
    <text x="842" y="82" class="small">3. Heet blok verdampt de vloeistof</text>

    <path d="M948 222 C1020 162, 1085 142, 1172 146" class="callout"/>
    <text x="1180" y="146" class="small">4. Damp stroomt via de uitlaat naar buiten</text>

    <text x="92" y="660" class="small">Werking: vloeistof wordt gepompt, verhit en verlaat de machine als zichtbare mist.</text>
  </g>
</svg>
